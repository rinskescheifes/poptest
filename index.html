<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poppen Teller</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #172033;
    }
    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    .card {
      width: min(1050px, 100%);
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 36px; }
    .subtitle { margin: 0 0 20px; color: #5f697a; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }
    button, .fileButton {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #172033;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .fileButton input { display: none; }
    .result {
      display: inline-flex;
      align-items: baseline;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #eef7ef;
      margin-bottom: 18px;
    }
    .result strong { font-size: 42px; }
    .label, .small, .note, .status { color: #5f697a; }
    .error { color: #a60000; font-weight: 700; }
    canvas {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border: 1px solid #e1e4e8;
      border-radius: 18px;
      background: #fafafa;
    }
    .note, .status { font-size: 14px; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Poppen Teller</h1>
      <p class="subtitle">
        De app zoekt het witte papier als vierhoek en telt alleen binnen die vierhoek.
      </p>

      <div class="actions">
        <label class="fileButton">
          Foto kiezen / maken
          <input id="fileInput" type="file" accept="image/*" capture="environment" />
        </label>

        <button id="analyseButton" disabled>Analyseer foto</button>
        <button id="downloadButton" disabled>Download gemarkeerde foto</button>
      </div>

      <p id="status" class="status"></p>
      <p id="error" class="error"></p>

      <div id="result" class="result" style="display:none;">
        <span class="label">Geschat totaal</span>
        <strong id="count">0</strong>
        <span id="small" class="small"></span>
      </div>

      <canvas id="canvas"></canvas>

      <p class="note">
        Blauw = gevonden papier-vierhoek. Groen = losse detectie. Oranje = vermoedelijk cluster/hoopje.
      </p>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const analyseButton = document.getElementById('analyseButton');
    const downloadButton = document.getElementById('downloadButton');
    const canvas = document.getElementById('canvas');
    const errorEl = document.getElementById('error');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const countEl = document.getElementById('count');
    const smallEl = document.getElementById('small');

    let selectedFile = null;

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Foto kon niet worden geladen.'));
        img.src = URL.createObjectURL(file);
      });
    }

    function drawImageToCanvas(img, maxSize = 1000) {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      canvas.width = Math.max(1, Math.round(img.width * scale));
      canvas.height = Math.max(1, Math.round(img.height * scale));
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function rgbToGray(r, g, b) {
      return Math.round(0.299 * r + 0.587 * g + 0.114 * b);
    }

    function isWhitePaperPixel(data, idx) {
      const r = data[idx], g = data[idx + 1], b = data[idx + 2];
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const gray = rgbToGray(r, g, b);

      // Licht, relatief neutraal, dus waarschijnlijk papier.
      return gray > 145 && (max - min) < 70;
    }

    function pointInPolygon(x, y, poly) {
      let inside = false;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i].x, yi = poly[i].y;
        const xj = poly[j].x, yj = poly[j].y;
        const intersect = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / ((yj - yi) || 0.000001) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function makeInsideMask(width, height, poly) {
      const mask = new Uint8Array(width * height);
      const minX = Math.max(0, Math.floor(Math.min(...poly.map(p => p.x))));
      const maxX = Math.min(width - 1, Math.ceil(Math.max(...poly.map(p => p.x))));
      const minY = Math.max(0, Math.floor(Math.min(...poly.map(p => p.y))));
      const maxY = Math.min(height - 1, Math.ceil(Math.max(...poly.map(p => p.y))));

      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          if (pointInPolygon(x, y, poly)) mask[y * width + x] = 1;
        }
      }
      return mask;
    }

    function findPaperQuad(imageData, width, height) {
      const data = imageData.data;

      // We scannen per richting waar de eerste duidelijke papierpixels zitten.
      // Daardoor ontstaat een vierhoek in plaats van een simpele rechthoek.
      const rowLeft = [];
      const rowRight = [];
      const colTop = [];
      const colBottom = [];

      const rowStep = Math.max(2, Math.round(height / 160));
      const colStep = Math.max(2, Math.round(width / 160));

      for (let y = 0; y < height; y += rowStep) {
        let left = null, right = null;
        for (let x = 0; x < width; x++) {
          if (isWhitePaperPixel(data, (y * width + x) * 4)) { left = x; break; }
        }
        for (let x = width - 1; x >= 0; x--) {
          if (isWhitePaperPixel(data, (y * width + x) * 4)) { right = x; break; }
        }
        if (left !== null && right !== null && right - left > width * 0.20) {
          rowLeft.push({x: left, y});
          rowRight.push({x: right, y});
        }
      }

      for (let x = 0; x < width; x += colStep) {
        let top = null, bottom = null;
        for (let y = 0; y < height; y++) {
          if (isWhitePaperPixel(data, (y * width + x) * 4)) { top = y; break; }
        }
        for (let y = height - 1; y >= 0; y--) {
          if (isWhitePaperPixel(data, (y * width + x) * 4)) { bottom = y; break; }
        }
        if (top !== null && bottom !== null && bottom - top > height * 0.20) {
          colTop.push({x, y: top});
          colBottom.push({x, y: bottom});
        }
      }

      function quantile(values, q) {
        if (!values.length) return 0;
        const sorted = [...values].sort((a, b) => a - b);
        return sorted[Math.max(0, Math.min(sorted.length - 1, Math.floor(q * (sorted.length - 1))))];
      }

      function filterByQuantile(points, key, lowQ, highQ) {
        const vals = points.map(p => p[key]);
        const low = quantile(vals, lowQ);
        const high = quantile(vals, highQ);
        return points.filter(p => p[key] >= low && p[key] <= high);
      }

      function fitLine(points) {
        // Least-squares lijn: ax + by + c = 0
        // Als x weinig varieert: x = constant; anders y = mx + b.
        if (points.length < 2) return null;

        const xs = points.map(p => p.x);
        const ys = points.map(p => p.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);

        if ((maxX - minX) < (maxY - minY)) {
          // x = m*y + b
          let sumY = 0, sumX = 0, sumYY = 0, sumYX = 0;
          for (const p of points) {
            sumY += p.y; sumX += p.x; sumYY += p.y * p.y; sumYX += p.y * p.x;
          }
          const n = points.length;
          const denom = n * sumYY - sumY * sumY || 1;
          const m = (n * sumYX - sumY * sumX) / denom;
          const b = (sumX - m * sumY) / n;
          // x - m*y - b = 0
          return {a: 1, b: -m, c: -b};
        } else {
          // y = m*x + b
          let sumX = 0, sumY = 0, sumXX = 0, sumXY = 0;
          for (const p of points) {
            sumX += p.x; sumY += p.y; sumXX += p.x * p.x; sumXY += p.x * p.y;
          }
          const n = points.length;
          const denom = n * sumXX - sumX * sumX || 1;
          const m = (n * sumXY - sumX * sumY) / denom;
          const b = (sumY - m * sumX) / n;
          // m*x - y + b = 0
          return {a: m, b: -1, c: b};
        }
      }

      function intersect(l1, l2) {
        const d = l1.a * l2.b - l2.a * l1.b;
        if (Math.abs(d) < 0.00001) return {x: 0, y: 0};
        return {
          x: (l1.b * l2.c - l2.b * l1.c) / d,
          y: (l1.c * l2.a - l2.c * l1.a) / d
        };
      }

      function clampPoint(p) {
        return {
          x: Math.max(0, Math.min(width - 1, p.x)),
          y: Math.max(0, Math.min(height - 1, p.y))
        };
      }

      // Pak alleen betrouwbare randpunten, niet losse witte objecten buiten het papier.
      const leftPts = filterByQuantile(rowLeft, "x", 0.03, 0.55);
      const rightPts = filterByQuantile(rowRight, "x", 0.45, 0.97);
      const topPts = filterByQuantile(colTop, "y", 0.03, 0.55);
      const bottomPts = filterByQuantile(colBottom, "y", 0.45, 0.97);

      const leftLine = fitLine(leftPts);
      const rightLine = fitLine(rightPts);
      const topLine = fitLine(topPts);
      const bottomLine = fitLine(bottomPts);

      if (!leftLine || !rightLine || !topLine || !bottomLine) {
        return {
          poly: [
            {x: width * 0.03, y: height * 0.03},
            {x: width * 0.97, y: height * 0.03},
            {x: width * 0.97, y: height * 0.97},
            {x: width * 0.03, y: height * 0.97}
          ],
          fallback: true
        };
      }

      let poly = [
        clampPoint(intersect(leftLine, topLine)),
        clampPoint(intersect(rightLine, topLine)),
        clampPoint(intersect(rightLine, bottomLine)),
        clampPoint(intersect(leftLine, bottomLine))
      ];

      // Iets naar binnen trekken zodat randen/tafel niet meetellen.
      const cx = poly.reduce((s, p) => s + p.x, 0) / 4;
      const cy = poly.reduce((s, p) => s + p.y, 0) / 4;
      poly = poly.map(p => ({
        x: cx + (p.x - cx) * 0.985,
        y: cy + (p.y - cy) * 0.985
      }));

      const area = Math.abs(
        poly.reduce((sum, p, i) => {
          const q = poly[(i + 1) % poly.length];
          return sum + p.x * q.y - q.x * p.y;
        }, 0) / 2
      );

      const fallback = area < width * height * 0.12;

      if (fallback) {
        poly = [
          {x: width * 0.03, y: height * 0.03},
          {x: width * 0.97, y: height * 0.03},
          {x: width * 0.97, y: height * 0.97},
          {x: width * 0.03, y: height * 0.97}
        ];
      }

      return {poly, fallback};
    }

    function getDarkMaskInsidePaper(imageData, width, height, insideMask) {
      const data = imageData.data;
      let sum = 0;
      let count = 0;
      const grays = new Uint8Array(width * height);

      for (let p = 0; p < width * height; p++) {
        if (!insideMask[p]) continue;
        const i = p * 4;
        const gray = rgbToGray(data[i], data[i + 1], data[i + 2]);
        grays[p] = gray;
        sum += gray;
        count++;
      }

      const mean = sum / Math.max(1, count);

      let variance = 0;
      for (let p = 0; p < width * height; p++) {
        if (!insideMask[p]) continue;
        const diff = grays[p] - mean;
        variance += diff * diff;
      }

      const std = Math.sqrt(variance / Math.max(1, count));
      const threshold = Math.max(35, Math.min(125, mean - std * 0.9));
      const mask = new Uint8Array(width * height);

      for (let p = 0; p < width * height; p++) {
        if (!insideMask[p]) continue;
        mask[p] = grays[p] < threshold ? 1 : 0;
      }

      return { mask, threshold, paperPixelCount: count };
    }

    function findComponents(mask, width, height, insideMask) {
      const visited = new Uint8Array(width * height);
      const components = [];
      const queue = new Int32Array(width * height);

      for (let start = 0; start < width * height; start++) {
        if (!insideMask[start] || !mask[start] || visited[start]) continue;

        let head = 0;
        let tail = 0;
        queue[tail++] = start;
        visited[start] = 1;

        let minX = width, maxX = 0, minY = height, maxY = 0, area = 0;

        while (head < tail) {
          const idx = queue[head++];
          area++;

          const y = Math.floor(idx / width);
          const x = idx - y * width;

          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;

          const neighbors = [idx - 1, idx + 1, idx - width, idx + width];

          for (const n of neighbors) {
            if (n < 0 || n >= width * height) continue;
            if (!insideMask[n] || !mask[n] || visited[n]) continue;

            visited[n] = 1;
            queue[tail++] = n;
          }
        }

        components.push({
          x: minX,
          y: minY,
          w: maxX - minX + 1,
          h: maxY - minY + 1,
          area
        });
      }

      return components;
    }

    function analyse() {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const width = canvas.width;
      const height = canvas.height;
      const imageData = ctx.getImageData(0, 0, width, height);

      const paper = findPaperQuad(imageData, width, height);
      const insideMask = makeInsideMask(width, height, paper.poly);
      const { mask, threshold, paperPixelCount } = getDarkMaskInsidePaper(imageData, width, height, insideMask);
      const components = findComponents(mask, width, height, insideMask);

      const minArea = Math.max(5, paperPixelCount * 0.00001);
      const maxArea = paperPixelCount * 0.005;

      const detections = [];

      for (const c of components) {
        if (c.area < minArea || c.area > maxArea) continue;

        const ratio = c.w / Math.max(1, c.h);
        if (ratio > 4.5 || ratio < 0.2) continue;

        const fill = c.area / Math.max(1, c.w * c.h);
        if (fill < 0.12) continue;

        const estimatedPieces = Math.max(1, Math.round(c.area / 24));
        detections.push({ ...c, count: estimatedPieces });
      }

      detections.sort((a, b) => (a.y - b.y) || (a.x - b.x));

      // Papier-vierhoek tekenen.
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#1a73e8';
      ctx.beginPath();
      ctx.moveTo(paper.poly[0].x, paper.poly[0].y);
      for (let i = 1; i < paper.poly.length; i++) ctx.lineTo(paper.poly[i].x, paper.poly[i].y);
      ctx.closePath();
      ctx.stroke();

      let total = 0;
      for (const d of detections) {
        total += d.count;
        ctx.lineWidth = 2;
        ctx.strokeStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.fillStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.strokeRect(d.x, d.y, d.w, d.h);
        if (d.count > 1) ctx.fillText(String(d.count), d.x, Math.max(14, d.y - 3));
      }

      return { total, detections, threshold, paper };
    }

    fileInput.addEventListener('change', async (event) => {
      selectedFile = event.target.files && event.target.files[0];
      if (!selectedFile) return;

      errorEl.textContent = '';
      resultEl.style.display = 'none';
      downloadButton.disabled = true;
      analyseButton.disabled = true;
      setStatus('Foto laden en verkleinen...');

      try {
        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 1000);
        analyseButton.disabled = false;
        setStatus('Foto klaar. Analyseformaat: ' + canvas.width + '×' + canvas.height + '.');
      } catch (err) {
        errorEl.textContent = err.message || 'Foto laden mislukt.';
        setStatus('');
      }
    });

    analyseButton.addEventListener('click', async () => {
      if (!selectedFile) {
        errorEl.textContent = 'Kies eerst een foto.';
        return;
      }

      analyseButton.disabled = true;
      analyseButton.textContent = 'Analyseren...';
      errorEl.textContent = '';
      resultEl.style.display = 'none';

      try {
        setStatus('Papier-vierhoek zoeken en poppen tellen...');
        await new Promise(resolve => setTimeout(resolve, 50));

        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 1000);

        const started = performance.now();
        const result = analyse();
        const seconds = ((performance.now() - started) / 1000).toFixed(1);

        countEl.textContent = result.total;
        smallEl.textContent = result.detections.length + ' objecten/clusters in ' + seconds + 's';
        resultEl.style.display = 'inline-flex';
        downloadButton.disabled = false;

        if (result.paper.fallback) {
          setStatus('Analyse klaar. Let op: papier-vierhoek was onzeker, daarom is bijna de hele foto gebruikt.');
        } else {
          setStatus('Analyse klaar. Papier-vierhoek gevonden.');
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Analyse mislukt.';
        setStatus('');
      } finally {
        analyseButton.disabled = false;
        analyseButton.textContent = 'Analyseer foto';
      }
    });

    downloadButton.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'poppen-telling.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
