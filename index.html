<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poppen Teller</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #172033;
    }
    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    .card {
      width: min(1050px, 100%);
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 36px; }
    .subtitle { margin: 0 0 20px; color: #5f697a; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }
    button, .fileButton {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #172033;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .fileButton input { display: none; }
    .result {
      display: inline-flex;
      align-items: baseline;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #eef7ef;
      margin-bottom: 18px;
    }
    .result strong { font-size: 42px; }
    .label, .small, .note, .status { color: #5f697a; }
    .error { color: #a60000; font-weight: 700; }
    canvas {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border: 1px solid #e1e4e8;
      border-radius: 18px;
      background: #fafafa;
    }
    .note, .status { font-size: 14px; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Poppen Teller</h1>
      <p class="subtitle">
        De app zoekt de 4 rechte papierkanten met randdetectie en maakt het kader extra ruim zodat het papier niet wordt afgesneden.
      </p>

      <div class="actions">
        <label class="fileButton">
          Foto kiezen / maken
          <input id="fileInput" type="file" accept="image/*" capture="environment" />
        </label>

        <button id="analyseButton" disabled>Analyseer foto</button>
        <button id="downloadButton" disabled>Download gemarkeerde foto</button>
      </div>

      <p id="status" class="status"></p>
      <p id="error" class="error"></p>

      <div id="result" class="result" style="display:none;">
        <span class="label">Geschat totaal</span>
        <strong id="count">0</strong>
        <span id="small" class="small"></span>
      </div>

      <canvas id="canvas"></canvas>

      <p class="note">
        Blauw = gevonden papierkanten. Groen = losse detectie. Oranje = vermoedelijk cluster/hoopje.
      </p>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const analyseButton = document.getElementById('analyseButton');
    const downloadButton = document.getElementById('downloadButton');
    const canvas = document.getElementById('canvas');
    const errorEl = document.getElementById('error');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const countEl = document.getElementById('count');
    const smallEl = document.getElementById('small');

    let selectedFile = null;

    function setStatus(text) { statusEl.textContent = text || ''; }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Foto kon niet worden geladen.'));
        img.src = URL.createObjectURL(file);
      });
    }

    function drawImageToCanvas(img, maxSize = 1000) {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      canvas.width = Math.max(1, Math.round(img.width * scale));
      canvas.height = Math.max(1, Math.round(img.height * scale));
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function grayAt(data, p) {
      const i = p * 4;
      return Math.round(0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]);
    }

    function pointInPolygon(x, y, poly) {
      let inside = false;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i].x, yi = poly[i].y;
        const xj = poly[j].x, yj = poly[j].y;
        const hit = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / ((yj - yi) || 0.000001) + xi);
        if (hit) inside = !inside;
      }
      return inside;
    }

    function makeInsideMask(width, height, poly) {
      const mask = new Uint8Array(width * height);
      const minX = Math.max(0, Math.floor(Math.min(...poly.map(p => p.x))));
      const maxX = Math.min(width - 1, Math.ceil(Math.max(...poly.map(p => p.x))));
      const minY = Math.max(0, Math.floor(Math.min(...poly.map(p => p.y))));
      const maxY = Math.min(height - 1, Math.ceil(Math.max(...poly.map(p => p.y))));
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          if (pointInPolygon(x, y, poly)) mask[y * width + x] = 1;
        }
      }
      return mask;
    }

    function lineFromPoints(p1, p2) {
      const a = p1.y - p2.y;
      const b = p2.x - p1.x;
      const c = p1.x * p2.y - p2.x * p1.y;
      const norm = Math.sqrt(a*a + b*b) || 1;
      return { a: a/norm, b: b/norm, c: c/norm };
    }

    function intersectLines(l1, l2) {
      const d = l1.a * l2.b - l2.a * l1.b;
      if (Math.abs(d) < 0.00001) return null;
      return {
        x: (l1.b * l2.c - l2.b * l1.c) / d,
        y: (l1.c * l2.a - l2.c * l1.a) / d
      };
    }

    function clampPoint(p, width, height) {
      return {
        x: Math.max(0, Math.min(width - 1, p.x)),
        y: Math.max(0, Math.min(height - 1, p.y))
      };
    }

    function scoreLineForWhiteEdge(imageData, width, height, line, sideWanted) {
      // sideWanted: +1 betekent papier ligt aan positieve kant; -1 negatieve kant.
      // De score kijkt of pixels aan papierzijde witter zijn dan buitenzijde.
      const data = imageData.data;
      let score = 0, samples = 0;
      const step = Math.max(3, Math.round(Math.max(width, height) / 220));

      for (let y = 2; y < height - 2; y += step) {
        for (let x = 2; x < width - 2; x += step) {
          const dist = line.a * x + line.b * y + line.c;
          if (Math.abs(dist) > 2.2) continue;

          const xIn = Math.round(x + line.a * sideWanted * 5);
          const yIn = Math.round(y + line.b * sideWanted * 5);
          const xOut = Math.round(x - line.a * sideWanted * 5);
          const yOut = Math.round(y - line.b * sideWanted * 5);

          if (xIn < 0 || xIn >= width || yIn < 0 || yIn >= height) continue;
          if (xOut < 0 || xOut >= width || yOut < 0 || yOut >= height) continue;

          const gIn = grayAt(data, yIn * width + xIn);
          const gOut = grayAt(data, yOut * width + xOut);
          score += gIn - gOut;
          samples++;
        }
      }

      return samples ? score / samples : -999;
    }

    function findPaperByEdgeSearch(imageData, width, height) {
      const data = imageData.data;
      const cx = width / 2, cy = height / 2;

      function brightness(x, y) {
        x = Math.max(0, Math.min(width - 1, Math.round(x)));
        y = Math.max(0, Math.min(height - 1, Math.round(y)));
        return grayAt(data, y * width + x);
      }

      function searchSide(side) {
        // We zoeken per zijde meerdere mogelijke schuine lijnen.
        // Kandidaten worden gescoord op: binnenzijde is lichter dan buitenzijde.
        let best = null;

        const angleRange = 38; // graden scheefstand toegestaan
        const angleStep = 2;
        const offsetStep = Math.max(3, Math.round(Math.max(width, height) / 220));

        for (let deg = -angleRange; deg <= angleRange; deg += angleStep) {
          const rad = deg * Math.PI / 180;
          let dir, normal, offsets, sideWanted;

          if (side === 'top' || side === 'bottom') {
            // lijn loopt ongeveer horizontaal
            dir = { x: Math.cos(rad), y: Math.sin(rad) };
            normal = { x: -dir.y, y: dir.x };
            if (side === 'top') {
              offsets = { from: -height * 0.55, to: height * 0.20 };
              sideWanted = 1; // papier onder de lijn
            } else {
              offsets = { from: -height * 0.20, to: height * 0.55 };
              sideWanted = -1; // papier boven de lijn
            }
          } else {
            // lijn loopt ongeveer verticaal
            dir = { x: -Math.sin(rad), y: Math.cos(rad) };
            normal = { x: dir.y, y: -dir.x };
            if (side === 'left') {
              offsets = { from: -width * 0.55, to: width * 0.20 };
              sideWanted = 1; // papier rechts van de lijn
            } else {
              offsets = { from: -width * 0.20, to: width * 0.55 };
              sideWanted = -1; // papier links van de lijn
            }
          }

          for (let off = offsets.from; off <= offsets.to; off += offsetStep) {
            const px = cx + normal.x * off;
            const py = cy + normal.y * off;
            const p1 = { x: px - dir.x * 2000, y: py - dir.y * 2000 };
            const p2 = { x: px + dir.x * 2000, y: py + dir.y * 2000 };
            const line = lineFromPoints(p1, p2);

            // Snelle score langs de lijn.
            let score = 0, samples = 0;
            const sampleCount = 80;
            for (let i = 0; i < sampleCount; i++) {
              const t = (i / (sampleCount - 1) - 0.5) * Math.max(width, height) * 1.45;
              const x = px + dir.x * t;
              const y = py + dir.y * t;

              const xIn = x + normal.x * sideWanted * 7;
              const yIn = y + normal.y * sideWanted * 7;
              const xOut = x - normal.x * sideWanted * 7;
              const yOut = y - normal.y * sideWanted * 7;

              if (xIn < 0 || xIn >= width || yIn < 0 || yIn >= height) continue;
              if (xOut < 0 || xOut >= width || yOut < 0 || yOut >= height) continue;

              const gIn = brightness(xIn, yIn);
              const gOut = brightness(xOut, yOut);

              // Wit papier binnen, donkere tafel/schaduw buiten.
              const diff = gIn - gOut;
              if (diff > 0) score += diff;
              else score += diff * 0.4;
              samples++;
            }

            if (samples < 18) continue;
            score = score / samples;

            if (!best || score > best.score) {
              best = { line, score, sideWanted, side, deg, off };
            }
          }
        }
        return best;
      }

      const top = searchSide('top');
      const right = searchSide('right');
      const bottom = searchSide('bottom');
      const left = searchSide('left');

      if (!top || !right || !bottom || !left) return fallbackQuad(width, height);

      let pTL = intersectLines(top.line, left.line);
      let pTR = intersectLines(top.line, right.line);
      let pBR = intersectLines(bottom.line, right.line);
      let pBL = intersectLines(bottom.line, left.line);

      if (!pTL || !pTR || !pBR || !pBL) return fallbackQuad(width, height);

      let poly = [
        clampPoint(pTL, width, height),
        clampPoint(pTR, width, height),
        clampPoint(pBR, width, height),
        clampPoint(pBL, width, height)
      ];

      const area = polygonArea(poly);
      if (area < width * height * 0.12) return fallbackQuad(width, height);

      // Maak het kader bewust ruimer. De eerdere versies pakten soms een binnenrand,
      // waardoor een deel van het papier buiten het blauwe kader viel.
      const pcx = poly.reduce((s, p) => s + p.x, 0) / 4;
      const pcy = poly.reduce((s, p) => s + p.y, 0) / 4;
      poly = poly.map(p => clampPoint({
        x: pcx + (p.x - pcx) * 1.08,
        y: pcy + (p.y - pcy) * 1.08
      }, width, height));

      return {
        poly,
        fallback: false,
        scores: {
          top: Math.round(top.score),
          right: Math.round(right.score),
          bottom: Math.round(bottom.score),
          left: Math.round(left.score)
        }
      };
    }

    function fallbackQuad(width, height) {
      return {
        poly: [
          {x: width * 0.005, y: height * 0.005},
          {x: width * 0.995, y: height * 0.005},
          {x: width * 0.995, y: height * 0.995},
          {x: width * 0.005, y: height * 0.995}
        ],
        fallback: true,
        scores: null
      };
    }

    function polygonArea(poly) {
      return Math.abs(poly.reduce((sum, p, i) => {
        const q = poly[(i + 1) % poly.length];
        return sum + p.x * q.y - q.x * p.y;
      }, 0) / 2);
    }

    function getDarkMaskInsidePaper(imageData, width, height, insideMask) {
      const data = imageData.data;
      let sum = 0, count = 0;
      const grays = new Uint8Array(width * height);

      for (let p = 0; p < width * height; p++) {
        if (!insideMask[p]) continue;
        const gray = grayAt(data, p);
        grays[p] = gray;
        sum += gray;
        count++;
      }

      const mean = sum / Math.max(1, count);
      let variance = 0;

      for (let p = 0; p < width * height; p++) {
        if (!insideMask[p]) continue;
        const diff = grays[p] - mean;
        variance += diff * diff;
      }

      const std = Math.sqrt(variance / Math.max(1, count));
      const threshold = Math.max(35, Math.min(125, mean - std * 0.9));
      const mask = new Uint8Array(width * height);

      for (let p = 0; p < width * height; p++) {
        if (!insideMask[p]) continue;
        mask[p] = grays[p] < threshold ? 1 : 0;
      }

      return { mask, threshold, paperPixelCount: count };
    }

    function findComponents(mask, width, height, insideMask) {
      const visited = new Uint8Array(width * height);
      const components = [];
      const queue = new Int32Array(width * height);

      for (let start = 0; start < width * height; start++) {
        if (!insideMask[start] || !mask[start] || visited[start]) continue;

        let head = 0, tail = 0;
        queue[tail++] = start;
        visited[start] = 1;

        let minX = width, maxX = 0, minY = height, maxY = 0, area = 0;

        while (head < tail) {
          const idx = queue[head++];
          area++;

          const y = Math.floor(idx / width);
          const x = idx - y * width;

          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;

          const neighbors = [idx - 1, idx + 1, idx - width, idx + width];

          for (const n of neighbors) {
            if (n < 0 || n >= width * height) continue;
            if (!insideMask[n] || !mask[n] || visited[n]) continue;
            visited[n] = 1;
            queue[tail++] = n;
          }
        }

        components.push({ x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1, area });
      }

      return components;
    }

    function analyse() {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const width = canvas.width;
      const height = canvas.height;
      const imageData = ctx.getImageData(0, 0, width, height);

      const paper = findPaperByEdgeSearch(imageData, width, height);
      const insideMask = makeInsideMask(width, height, paper.poly);
      const { mask, paperPixelCount } = getDarkMaskInsidePaper(imageData, width, height, insideMask);
      const components = findComponents(mask, width, height, insideMask);

      const minArea = Math.max(5, paperPixelCount * 0.00001);
      const maxArea = paperPixelCount * 0.005;
      const detections = [];

      for (const c of components) {
        if (c.area < minArea || c.area > maxArea) continue;
        const ratio = c.w / Math.max(1, c.h);
        if (ratio > 4.8 || ratio < 0.18) continue;
        const fill = c.area / Math.max(1, c.w * c.h);
        if (fill < 0.12) continue;

        const estimatedPieces = Math.max(1, Math.round(c.area / 24));
        detections.push({ ...c, count: estimatedPieces });
      }

      detections.sort((a, b) => (a.y - b.y) || (a.x - b.x));

      ctx.lineWidth = 5;
      ctx.strokeStyle = '#1a73e8';
      ctx.beginPath();
      ctx.moveTo(paper.poly[0].x, paper.poly[0].y);
      for (let i = 1; i < paper.poly.length; i++) ctx.lineTo(paper.poly[i].x, paper.poly[i].y);
      ctx.closePath();
      ctx.stroke();

      let total = 0;
      for (const d of detections) {
        total += d.count;
        ctx.lineWidth = 2;
        ctx.strokeStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.fillStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.strokeRect(d.x, d.y, d.w, d.h);
        if (d.count > 1) ctx.fillText(String(d.count), d.x, Math.max(14, d.y - 3));
      }

      return { total, detections, paper };
    }

    fileInput.addEventListener('change', async (event) => {
      selectedFile = event.target.files && event.target.files[0];
      if (!selectedFile) return;

      errorEl.textContent = '';
      resultEl.style.display = 'none';
      downloadButton.disabled = true;
      analyseButton.disabled = true;
      setStatus('Foto laden en verkleinen...');

      try {
        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 1000);
        analyseButton.disabled = false;
        setStatus('Foto klaar. Analyseformaat: ' + canvas.width + '×' + canvas.height + '.');
      } catch (err) {
        errorEl.textContent = err.message || 'Foto laden mislukt.';
        setStatus('');
      }
    });

    analyseButton.addEventListener('click', async () => {
      if (!selectedFile) {
        errorEl.textContent = 'Kies eerst een foto.';
        return;
      }

      analyseButton.disabled = true;
      analyseButton.textContent = 'Analyseren...';
      errorEl.textContent = '';
      resultEl.style.display = 'none';

      try {
        setStatus('Vier papierkanten zoeken...');
        await new Promise(resolve => setTimeout(resolve, 50));

        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 1000);

        const started = performance.now();
        const result = analyse();
        const seconds = ((performance.now() - started) / 1000).toFixed(1);

        countEl.textContent = result.total;
        smallEl.textContent = result.detections.length + ' objecten/clusters in ' + seconds + 's';
        resultEl.style.display = 'inline-flex';
        downloadButton.disabled = false;

        if (result.paper.fallback) {
          setStatus('Analyse klaar. Let op: papierkanten waren onzeker, bijna de hele foto is gebruikt.');
        } else {
          setStatus('Analyse klaar. Vier papierkanten gevonden.');
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Analyse mislukt.';
        setStatus('');
      } finally {
        analyseButton.disabled = false;
        analyseButton.textContent = 'Analyseer foto';
      }
    });

    downloadButton.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'poppen-telling.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
