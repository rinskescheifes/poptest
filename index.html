<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poppen Teller</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #172033;
    }
    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    .card {
      width: min(1050px, 100%);
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 36px; }
    .subtitle { margin: 0 0 20px; color: #5f697a; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }
    button, .fileButton {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #172033;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .fileButton input { display: none; }
    .result {
      display: inline-flex;
      align-items: baseline;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #eef7ef;
      margin-bottom: 18px;
    }
    .result strong { font-size: 42px; }
    .label, .small, .note, .status { color: #5f697a; }
    .error { color: #a60000; font-weight: 700; }
    canvas {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border: 1px solid #e1e4e8;
      border-radius: 18px;
      background: #fafafa;
    }
    .note, .status { font-size: 14px; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Poppen Teller</h1>
      <p class="subtitle">
        Upload of maak een foto. Deze versie gebruikt geen OpenCV en werkt volledig in de browser.
      </p>

      <div class="actions">
        <label class="fileButton">
          Foto kiezen / maken
          <input id="fileInput" type="file" accept="image/*" capture="environment" />
        </label>

        <button id="analyseButton" disabled>Analyseer foto</button>
        <button id="downloadButton" disabled>Download gemarkeerde foto</button>
      </div>

      <p id="status" class="status"></p>
      <p id="error" class="error"></p>

      <div id="result" class="result" style="display:none;">
        <span class="label">Geschat totaal</span>
        <strong id="count">0</strong>
        <span id="small" class="small"></span>
      </div>

      <canvas id="canvas"></canvas>

      <p class="note">
        Groen = losse detectie. Oranje = vermoedelijk cluster/hoopje. Geen instellingen nodig.
      </p>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const analyseButton = document.getElementById('analyseButton');
    const downloadButton = document.getElementById('downloadButton');
    const canvas = document.getElementById('canvas');
    const errorEl = document.getElementById('error');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const countEl = document.getElementById('count');
    const smallEl = document.getElementById('small');

    let selectedFile = null;

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Foto kon niet worden geladen.'));
        img.src = URL.createObjectURL(file);
      });
    }

    function drawImageToCanvas(img, maxSize = 900) {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      canvas.width = Math.max(1, Math.round(img.width * scale));
      canvas.height = Math.max(1, Math.round(img.height * scale));
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function getDarkMask(imageData, width, height) {
      const data = imageData.data;
      const grays = new Uint8Array(width * height);

      let sum = 0;
      for (let i = 0, p = 0; i < data.length; i += 4, p++) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        const gray = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
        grays[p] = gray;
        sum += gray;
      }

      const mean = sum / grays.length;

      let variance = 0;
      for (let i = 0; i < grays.length; i++) {
        const diff = grays[i] - mean;
        variance += diff * diff;
      }
      const std = Math.sqrt(variance / grays.length);

      // Automatische drempel voor donkere objecten op wit papier.
      // Lager = strenger. Hiermee worden potloodlijnen grotendeels genegeerd.
      const threshold = Math.max(35, Math.min(125, mean - std * 0.85));

      const mask = new Uint8Array(width * height);
      for (let i = 0; i < grays.length; i++) {
        mask[i] = grays[i] < threshold ? 1 : 0;
      }

      return { mask, threshold, mean, std };
    }

    function findComponents(mask, width, height) {
      const visited = new Uint8Array(width * height);
      const components = [];
      const queue = new Int32Array(width * height);

      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const start = y * width + x;
          if (!mask[start] || visited[start]) continue;

          let head = 0;
          let tail = 0;
          queue[tail++] = start;
          visited[start] = 1;

          let minX = x, maxX = x, minY = y, maxY = y, area = 0;

          while (head < tail) {
            const idx = queue[head++];
            area++;

            const cy = Math.floor(idx / width);
            const cx = idx - cy * width;

            if (cx < minX) minX = cx;
            if (cx > maxX) maxX = cx;
            if (cy < minY) minY = cy;
            if (cy > maxY) maxY = cy;

            const n1 = idx - 1, n2 = idx + 1, n3 = idx - width, n4 = idx + width;
            if (mask[n1] && !visited[n1]) { visited[n1] = 1; queue[tail++] = n1; }
            if (mask[n2] && !visited[n2]) { visited[n2] = 1; queue[tail++] = n2; }
            if (mask[n3] && !visited[n3]) { visited[n3] = 1; queue[tail++] = n3; }
            if (mask[n4] && !visited[n4]) { visited[n4] = 1; queue[tail++] = n4; }
          }

          components.push({
            x: minX,
            y: minY,
            w: maxX - minX + 1,
            h: maxY - minY + 1,
            area
          });
        }
      }

      return components;
    }

    function analyse() {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const width = canvas.width;
      const height = canvas.height;
      const imageData = ctx.getImageData(0, 0, width, height);

      const { mask, threshold } = getDarkMask(imageData, width, height);
      const components = findComponents(mask, width, height);

      const canvasArea = width * height;
      const minArea = Math.max(5, canvasArea * 0.000008);
      const maxArea = canvasArea * 0.004;

      const detections = [];

      for (const c of components) {
        if (c.area < minArea || c.area > maxArea) continue;

        const ratio = c.w / Math.max(1, c.h);
        if (ratio > 4.5 || ratio < 0.2) continue;

        // Negeer heel dunne potloodlijnen.
        const fill = c.area / Math.max(1, c.w * c.h);
        if (fill < 0.12) continue;

        const estimatedPieces = Math.max(1, Math.round(c.area / 24));
        detections.push({ ...c, count: estimatedPieces });
      }

      detections.sort((a, b) => (a.y - b.y) || (a.x - b.x));

      let total = 0;
      for (const d of detections) {
        total += d.count;
        ctx.lineWidth = 2;
        ctx.strokeStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.fillStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.strokeRect(d.x, d.y, d.w, d.h);
        if (d.count > 1) {
          ctx.fillText(String(d.count), d.x, Math.max(14, d.y - 3));
        }
      }

      return { total, detections, components: components.length, threshold };
    }

    fileInput.addEventListener('change', async (event) => {
      selectedFile = event.target.files && event.target.files[0];
      if (!selectedFile) return;

      errorEl.textContent = '';
      resultEl.style.display = 'none';
      downloadButton.disabled = true;
      analyseButton.disabled = true;
      setStatus('Foto laden en verkleinen...');

      try {
        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 900);
        analyseButton.disabled = false;
        setStatus('Foto klaar. Analyseformaat: ' + canvas.width + '×' + canvas.height + '.');
      } catch (err) {
        errorEl.textContent = err.message || 'Foto laden mislukt.';
        setStatus('');
      }
    });

    analyseButton.addEventListener('click', async () => {
      if (!selectedFile) {
        errorEl.textContent = 'Kies eerst een foto.';
        return;
      }

      analyseButton.disabled = true;
      analyseButton.textContent = 'Analyseren...';
      errorEl.textContent = '';
      resultEl.style.display = 'none';

      try {
        setStatus('Analyseren...');
        await new Promise(resolve => setTimeout(resolve, 50));

        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 900);

        const started = performance.now();
        const result = analyse();
        const seconds = ((performance.now() - started) / 1000).toFixed(1);

        countEl.textContent = result.total;
        smallEl.textContent = result.detections.length + ' objecten/clusters in ' + seconds + 's';
        resultEl.style.display = 'inline-flex';
        downloadButton.disabled = false;
        setStatus('Analyse klaar. Drempelwaarde: ' + Math.round(result.threshold) + '.');
      } catch (err) {
        errorEl.textContent = err.message || 'Analyse mislukt.';
        setStatus('');
      } finally {
        analyseButton.disabled = false;
        analyseButton.textContent = 'Analyseer foto';
      }
    });

    downloadButton.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'poppen-telling.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
