<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poppen Teller</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #172033;
    }
    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    .card {
      width: min(1050px, 100%);
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 36px; }
    .subtitle { margin: 0 0 20px; color: #5f697a; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }
    button, .fileButton {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #172033;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .fileButton input { display: none; }
    .result {
      display: inline-flex;
      align-items: baseline;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #eef7ef;
      margin-bottom: 18px;
    }
    .result strong { font-size: 42px; }
    .label, .small, .note, .status { color: #5f697a; }
    .error { color: #a60000; font-weight: 700; }
    canvas {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border: 1px solid #e1e4e8;
      border-radius: 18px;
      background: #fafafa;
    }
    .note, .status { font-size: 14px; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Poppen Teller</h1>
      <p class="subtitle">
        Upload of maak een foto. De app verkleint de foto automatisch voor snelle analyse.
      </p>

      <div class="actions">
        <label class="fileButton">
          Foto kiezen / maken
          <input id="fileInput" type="file" accept="image/*" capture="environment" />
        </label>

        <button id="analyseButton" disabled>Analyseer foto</button>
        <button id="downloadButton" disabled>Download gemarkeerde foto</button>
      </div>

      <p id="status" class="status"></p>
      <p id="error" class="error"></p>

      <div id="result" class="result" style="display:none;">
        <span class="label">Geschat totaal</span>
        <strong id="count">0</strong>
        <span id="small" class="small"></span>
      </div>

      <canvas id="canvas"></canvas>

      <p class="note">
        Deze snelle versie analyseert maximaal 900 pixels aan de langste zijde. Dat voorkomt vastlopen bij grote telefoonfoto’s.
      </p>
    </section>
  </main>

  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

  <script>
    const fileInput = document.getElementById('fileInput');
    const analyseButton = document.getElementById('analyseButton');
    const downloadButton = document.getElementById('downloadButton');
    const canvas = document.getElementById('canvas');
    const errorEl = document.getElementById('error');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const countEl = document.getElementById('count');
    const smallEl = document.getElementById('small');

    let selectedFile = null;

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function waitFrame() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    function waitForOpenCV() {
      return new Promise((resolve, reject) => {
        const started = Date.now();
        const timer = setInterval(() => {
          if (window.cv && window.cv.Mat && window.cv.imread) {
            clearInterval(timer);
            resolve(window.cv);
          }
          if (Date.now() - started > 20000) {
            clearInterval(timer);
            reject(new Error('OpenCV kon niet geladen worden. Ververs de pagina en probeer opnieuw.'));
          }
        }, 100);
      });
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Foto kon niet worden geladen.'));
        img.src = URL.createObjectURL(file);
      });
    }

    function drawImageToCanvas(img, maxSize = 900) {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      canvas.width = Math.max(1, Math.round(img.width * scale));
      canvas.height = Math.max(1, Math.round(img.height * scale));
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      return scale;
    }

    function analyseCanvas(cv) {
      const src = cv.imread(canvas);
      const gray = new cv.Mat();
      const blur = new cv.Mat();
      const binary = new cv.Mat();
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();

      try {
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        cv.GaussianBlur(gray, blur, new cv.Size(3, 3), 0);
        cv.threshold(blur, binary, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);

        const kernelOpen = cv.Mat.ones(2, 2, cv.CV_8U);
        cv.morphologyEx(binary, binary, cv.MORPH_OPEN, kernelOpen);
        kernelOpen.delete();

        cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 2;
        ctx.font = '14px Arial';

        let detections = [];
        const canvasArea = canvas.width * canvas.height;

        // Strengere grenzen: minder ruis, sneller klaar.
        const minArea = Math.max(6, canvasArea * 0.00001);
        const maxArea = canvasArea * 0.003;

        // Veiligheidslimiet: voorkomt vastlopen als er duizenden ruiscontouren zijn.
        const maxContoursToCheck = Math.min(contours.size(), 5000);

        for (let i = 0; i < maxContoursToCheck; i++) {
          const cnt = contours.get(i);
          const area = cv.contourArea(cnt);

          if (area >= minArea && area <= maxArea) {
            const rect = cv.boundingRect(cnt);
            const ratio = rect.width / Math.max(1, rect.height);

            // Lange lijnen, randjes en krassen negeren.
            if (ratio <= 3.8 && ratio >= 0.25) {
              // Schatting voor clusters. Aangepast op kleinere analyse-resolutie.
              const estimatedPieces = Math.max(1, Math.round(area / 28));

              detections.push({
                x: rect.x,
                y: rect.y,
                w: rect.width,
                h: rect.height,
                area,
                count: estimatedPieces
              });
            }
          }

          cnt.delete();
        }

        detections.sort((a, b) => (a.y - b.y) || (a.x - b.x));

        let total = 0;
        detections.forEach(d => {
          total += d.count;
          ctx.strokeStyle = d.count > 1 ? '#ff7a00' : '#00a651';
          ctx.fillStyle = d.count > 1 ? '#ff7a00' : '#00a651';
          ctx.strokeRect(d.x, d.y, d.w, d.h);
          if (d.count > 1) {
            ctx.fillText(String(d.count), d.x, Math.max(14, d.y - 3));
          }
        });

        return { total, detections, checkedContours: maxContoursToCheck, allContours: contours.size() };
      } finally {
        src.delete();
        gray.delete();
        blur.delete();
        binary.delete();
        contours.delete();
        hierarchy.delete();
      }
    }

    fileInput.addEventListener('change', async (event) => {
      selectedFile = event.target.files && event.target.files[0];
      if (!selectedFile) return;

      errorEl.textContent = '';
      resultEl.style.display = 'none';
      downloadButton.disabled = true;
      analyseButton.disabled = true;
      setStatus('Foto laden en verkleinen...');

      try {
        const img = await loadImage(selectedFile);
        const scale = drawImageToCanvas(img, 900);
        analyseButton.disabled = false;
        setStatus('Foto klaar. Origineel: ' + img.width + '×' + img.height + '. Analyseformaat: ' + canvas.width + '×' + canvas.height + '.');
      } catch (err) {
        errorEl.textContent = err.message || 'Foto laden mislukt.';
        setStatus('');
      }
    });

    analyseButton.addEventListener('click', async () => {
      if (!selectedFile) {
        errorEl.textContent = 'Kies eerst een foto.';
        return;
      }

      analyseButton.disabled = true;
      analyseButton.textContent = 'Analyseren...';
      errorEl.textContent = '';
      resultEl.style.display = 'none';

      try {
        setStatus('OpenCV laden...');
        const cv = await waitForOpenCV();
        await waitFrame();

        setStatus('Foto opnieuw laden...');
        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 900);
        await waitFrame();

        setStatus('Poppen zoeken...');
        const started = performance.now();
        const result = analyseCanvas(cv);
        const seconds = ((performance.now() - started) / 1000).toFixed(1);

        countEl.textContent = result.total;
        smallEl.textContent = result.detections.length + ' objecten/clusters gevonden in ' + seconds + 's';
        resultEl.style.display = 'inline-flex';
        downloadButton.disabled = false;

        if (result.allContours >= 5000) {
          setStatus('Analyse klaar. Let op: veel ruis gevonden; maak de foto liefst op egaal wit papier met goed licht.');
        } else {
          setStatus('Analyse klaar.');
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Analyse mislukt.';
        setStatus('');
      } finally {
        analyseButton.disabled = false;
        analyseButton.textContent = 'Analyseer foto';
      }
    });

    downloadButton.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'poppen-telling.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
