<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poppen Teller</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #172033;
    }
    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    .card {
      width: min(1050px, 100%);
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 8px; font-size: 36px; }
    .subtitle { margin: 0 0 20px; color: #5f697a; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }
    button, .fileButton {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #172033;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .fileButton input { display: none; }
    .result {
      display: inline-flex;
      align-items: baseline;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #eef7ef;
      margin-bottom: 18px;
    }
    .result strong { font-size: 42px; }
    .label, .small, .note, .status { color: #5f697a; }
    .error { color: #a60000; font-weight: 700; }
    canvas {
      display: block;
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border: 1px solid #e1e4e8;
      border-radius: 18px;
      background: #fafafa;
    }
    .note, .status { font-size: 14px; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Poppen Teller</h1>
      <p class="subtitle">
        De app zoekt eerst het witte papier en telt daarna alleen poppen binnen dat papier.
      </p>

      <div class="actions">
        <label class="fileButton">
          Foto kiezen / maken
          <input id="fileInput" type="file" accept="image/*" capture="environment" />
        </label>

        <button id="analyseButton" disabled>Analyseer foto</button>
        <button id="downloadButton" disabled>Download gemarkeerde foto</button>
      </div>

      <p id="status" class="status"></p>
      <p id="error" class="error"></p>

      <div id="result" class="result" style="display:none;">
        <span class="label">Geschat totaal</span>
        <strong id="count">0</strong>
        <span id="small" class="small"></span>
      </div>

      <canvas id="canvas"></canvas>

      <p class="note">
        Blauw = gevonden papierkader. Groen = losse detectie. Oranje = vermoedelijk cluster/hoopje.
      </p>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const analyseButton = document.getElementById('analyseButton');
    const downloadButton = document.getElementById('downloadButton');
    const canvas = document.getElementById('canvas');
    const errorEl = document.getElementById('error');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const countEl = document.getElementById('count');
    const smallEl = document.getElementById('small');

    let selectedFile = null;

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Foto kon niet worden geladen.'));
        img.src = URL.createObjectURL(file);
      });
    }

    function drawImageToCanvas(img, maxSize = 1000) {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      canvas.width = Math.max(1, Math.round(img.width * scale));
      canvas.height = Math.max(1, Math.round(img.height * scale));
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function rgbToGray(r, g, b) {
      return Math.round(0.299 * r + 0.587 * g + 0.114 * b);
    }

    function findPaperRect(imageData, width, height) {
      const data = imageData.data;

      // Zoek heldere, vrij neutrale pixels: waarschijnlijk wit papier.
      const white = new Uint8Array(width * height);

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const i = (y * width + x) * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2];
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const gray = rgbToGray(r, g, b);

          // Wit papier is licht en niet heel verzadigd.
          if (gray > 145 && (max - min) < 65) {
            white[y * width + x] = 1;
          }
        }
      }

      // Per rij/kolom bepalen hoeveel wit er zit.
      const rowCounts = new Int32Array(height);
      const colCounts = new Int32Array(width);

      for (let y = 0; y < height; y++) {
        let row = 0;
        for (let x = 0; x < width; x++) {
          if (white[y * width + x]) {
            row++;
            colCounts[x]++;
          }
        }
        rowCounts[y] = row;
      }

      // Papier moet een groot aaneengesloten wit vlak zijn.
      const minRowWhite = width * 0.18;
      const minColWhite = height * 0.18;

      let top = 0, bottom = height - 1, left = 0, right = width - 1;

      for (let y = 0; y < height; y++) {
        if (rowCounts[y] > minRowWhite) { top = y; break; }
      }
      for (let y = height - 1; y >= 0; y--) {
        if (rowCounts[y] > minRowWhite) { bottom = y; break; }
      }
      for (let x = 0; x < width; x++) {
        if (colCounts[x] > minColWhite) { left = x; break; }
      }
      for (let x = width - 1; x >= 0; x--) {
        if (colCounts[x] > minColWhite) { right = x; break; }
      }

      // Als detectie onwaarschijnlijk is, val terug op bijna hele beeld.
      const rectW = right - left + 1;
      const rectH = bottom - top + 1;
      const rectArea = rectW * rectH;
      const imageArea = width * height;

      if (rectW < width * 0.25 || rectH < height * 0.25 || rectArea < imageArea * 0.15) {
        return {
          x: Math.round(width * 0.03),
          y: Math.round(height * 0.03),
          w: Math.round(width * 0.94),
          h: Math.round(height * 0.94),
          fallback: true
        };
      }

      // Iets naar binnen halen zodat rand/tafel buiten papier niet meetelt.
      const padX = Math.max(3, Math.round(rectW * 0.015));
      const padY = Math.max(3, Math.round(rectH * 0.015));

      left = Math.min(width - 1, left + padX);
      right = Math.max(0, right - padX);
      top = Math.min(height - 1, top + padY);
      bottom = Math.max(0, bottom - padY);

      return {
        x: left,
        y: top,
        w: right - left + 1,
        h: bottom - top + 1,
        fallback: false
      };
    }

    function getDarkMaskInsidePaper(imageData, width, height, paper) {
      const data = imageData.data;
      const grays = [];

      for (let y = paper.y; y < paper.y + paper.h; y++) {
        for (let x = paper.x; x < paper.x + paper.w; x++) {
          const i = (y * width + x) * 4;
          const gray = rgbToGray(data[i], data[i + 1], data[i + 2]);
          grays.push(gray);
        }
      }

      let sum = 0;
      for (const g of grays) sum += g;
      const mean = sum / Math.max(1, grays.length);

      let variance = 0;
      for (const g of grays) {
        const diff = g - mean;
        variance += diff * diff;
      }
      const std = Math.sqrt(variance / Math.max(1, grays.length));

      const threshold = Math.max(35, Math.min(125, mean - std * 0.9));
      const mask = new Uint8Array(width * height);

      for (let y = paper.y; y < paper.y + paper.h; y++) {
        for (let x = paper.x; x < paper.x + paper.w; x++) {
          const i = (y * width + x) * 4;
          const gray = rgbToGray(data[i], data[i + 1], data[i + 2]);
          mask[y * width + x] = gray < threshold ? 1 : 0;
        }
      }

      return { mask, threshold, mean, std };
    }

    function findComponents(mask, width, height, paper) {
      const visited = new Uint8Array(width * height);
      const components = [];
      const queue = new Int32Array(width * height);

      const xStart = Math.max(1, paper.x);
      const yStart = Math.max(1, paper.y);
      const xEnd = Math.min(width - 2, paper.x + paper.w - 1);
      const yEnd = Math.min(height - 2, paper.y + paper.h - 1);

      for (let y = yStart; y <= yEnd; y++) {
        for (let x = xStart; x <= xEnd; x++) {
          const start = y * width + x;
          if (!mask[start] || visited[start]) continue;

          let head = 0;
          let tail = 0;
          queue[tail++] = start;
          visited[start] = 1;

          let minX = x, maxX = x, minY = y, maxY = y, area = 0;

          while (head < tail) {
            const idx = queue[head++];
            area++;

            const cy = Math.floor(idx / width);
            const cx = idx - cy * width;

            if (cx < minX) minX = cx;
            if (cx > maxX) maxX = cx;
            if (cy < minY) minY = cy;
            if (cy > maxY) maxY = cy;

            const neighbors = [idx - 1, idx + 1, idx - width, idx + width];

            for (const n of neighbors) {
              const ny = Math.floor(n / width);
              const nx = n - ny * width;

              if (
                nx >= xStart && nx <= xEnd &&
                ny >= yStart && ny <= yEnd &&
                mask[n] && !visited[n]
              ) {
                visited[n] = 1;
                queue[tail++] = n;
              }
            }
          }

          components.push({
            x: minX,
            y: minY,
            w: maxX - minX + 1,
            h: maxY - minY + 1,
            area
          });
        }
      }

      return components;
    }

    function analyse() {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const width = canvas.width;
      const height = canvas.height;
      const imageData = ctx.getImageData(0, 0, width, height);

      const paper = findPaperRect(imageData, width, height);
      const { mask, threshold } = getDarkMaskInsidePaper(imageData, width, height, paper);
      const components = findComponents(mask, width, height, paper);

      const paperArea = paper.w * paper.h;
      const minArea = Math.max(5, paperArea * 0.00001);
      const maxArea = paperArea * 0.005;

      const detections = [];

      for (const c of components) {
        if (c.area < minArea || c.area > maxArea) continue;

        const ratio = c.w / Math.max(1, c.h);
        if (ratio > 4.5 || ratio < 0.2) continue;

        const fill = c.area / Math.max(1, c.w * c.h);
        if (fill < 0.12) continue;

        const estimatedPieces = Math.max(1, Math.round(c.area / 24));
        detections.push({ ...c, count: estimatedPieces });
      }

      detections.sort((a, b) => (a.y - b.y) || (a.x - b.x));

      // Papierkader tekenen.
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#1a73e8';
      ctx.strokeRect(paper.x, paper.y, paper.w, paper.h);

      let total = 0;
      for (const d of detections) {
        total += d.count;
        ctx.lineWidth = 2;
        ctx.strokeStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.fillStyle = d.count > 1 ? '#ff7a00' : '#00a651';
        ctx.strokeRect(d.x, d.y, d.w, d.h);
        if (d.count > 1) {
          ctx.fillText(String(d.count), d.x, Math.max(14, d.y - 3));
        }
      }

      return { total, detections, components: components.length, threshold, paper };
    }

    fileInput.addEventListener('change', async (event) => {
      selectedFile = event.target.files && event.target.files[0];
      if (!selectedFile) return;

      errorEl.textContent = '';
      resultEl.style.display = 'none';
      downloadButton.disabled = true;
      analyseButton.disabled = true;
      setStatus('Foto laden en verkleinen...');

      try {
        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 1000);
        analyseButton.disabled = false;
        setStatus('Foto klaar. Analyseformaat: ' + canvas.width + '×' + canvas.height + '.');
      } catch (err) {
        errorEl.textContent = err.message || 'Foto laden mislukt.';
        setStatus('');
      }
    });

    analyseButton.addEventListener('click', async () => {
      if (!selectedFile) {
        errorEl.textContent = 'Kies eerst een foto.';
        return;
      }

      analyseButton.disabled = true;
      analyseButton.textContent = 'Analyseren...';
      errorEl.textContent = '';
      resultEl.style.display = 'none';

      try {
        setStatus('Papier zoeken en poppen tellen...');
        await new Promise(resolve => setTimeout(resolve, 50));

        const img = await loadImage(selectedFile);
        drawImageToCanvas(img, 1000);

        const started = performance.now();
        const result = analyse();
        const seconds = ((performance.now() - started) / 1000).toFixed(1);

        countEl.textContent = result.total;
        smallEl.textContent = result.detections.length + ' objecten/clusters in ' + seconds + 's';
        resultEl.style.display = 'inline-flex';
        downloadButton.disabled = false;

        if (result.paper.fallback) {
          setStatus('Analyse klaar. Let op: papierkader was onzeker, daarom is bijna de hele foto gebruikt.');
        } else {
          setStatus('Analyse klaar. Papierkader gevonden: ' + result.paper.w + '×' + result.paper.h + '.');
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Analyse mislukt.';
        setStatus('');
      } finally {
        analyseButton.disabled = false;
        analyseButton.textContent = 'Analyseer foto';
      }
    });

    downloadButton.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'poppen-telling.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
